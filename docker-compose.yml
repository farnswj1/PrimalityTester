services:
  redis:
    container_name: redis
    image: redis:7
    restart: always
    volumes:
      - redis_data:/data/:rw
    networks:
      - private
  app:
    container_name: app
    image: app
    build: .
    restart: always
    env_file:
      - ./backend/.env
    networks:
      - public
      - private
    depends_on:
      - redis
  nginx:
    container_name: nginx
    image: nginx:1.23-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_data:/var/www/certbot/:ro
      - ssl_certs:/etc/letsencrypt/:ro
    networks:
      - public
    depends_on:
      - app
  certbot:
    container_name: certbot
    image: certbot/certbot
    volumes:
      - ./certbot/cli.ini:/etc/letsencrypt/cli.ini:ro
      - certbot_data:/var/www/certbot/:rw
      - ssl_certs:/etc/letsencrypt/:rw
    networks:
      - public
    depends_on:
      - nginx
volumes:
  redis_data:
  certbot_data:
  ssl_certs:
networks:
  public:
  private:
