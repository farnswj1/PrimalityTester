name: Docker Build, Test, and Push
on:
  push:
    branches:
      - master
jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Create backend environment file
        run: echo "${{ secrets.BACKEND_ENV_FILE }}" > backend/.env
      - name: Create frontend environment file
        run: echo "${{ secrets.FRONTEND_ENV_FILE }}" > frontend/.env
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: ${{ vars.REGISTRY_URL }}/primality_tester
          load: true
      - name: Test app image
        run: docker run --env-file backend/.env --network host --rm ${{ vars.REGISTRY_URL }}/primality_tester npm test
      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: ${{ vars.REGISTRY_URL }}/primality_tester
          push: true
